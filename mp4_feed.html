<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hooked — your discovery feed</title>
<style>
  :root { --accent:#ff2d55; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  html,body { height:100%; background:#000; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #feed { height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
  #feed::-webkit-scrollbar { display:none; }
  .card { position:relative; height:100dvh; scroll-snap-align:start; scroll-snap-stop:always;
    display:flex; align-items:center; justify-content:center; background:#000; }
  .card video { height:100%; width:100%; max-width:480px; object-fit:contain; background:#000; }
  .ov { position:absolute; inset:0; max-width:480px; left:50%; transform:translateX(-50%);
    pointer-events:none; }
  .meta { position:absolute; left:18px; right:90px; bottom:30px; pointer-events:none;
    text-shadow:0 1px 10px rgba(0,0,0,.8); }
  .chan { font-size:15px; font-weight:800; }
  .vtitle { font-size:12.5px; opacity:.85; margin-top:3px; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .watch { position:absolute; left:50%; transform:translateX(-50%); bottom:26px;
    background:var(--accent); color:#fff; text-decoration:none; font-weight:800;
    padding:12px 22px; border-radius:999px; font-size:15px; pointer-events:auto;
    box-shadow:0 6px 24px rgba(255,45,85,.45); display:none; }
  .rail { position:absolute; right:12px; bottom:34px; display:flex; flex-direction:column;
    gap:16px; pointer-events:auto; }
  .rbtn { width:48px; height:48px; border-radius:50%; border:0; cursor:pointer;
    background:rgba(255,255,255,.16); color:#fff; font-size:19px; backdrop-filter:blur(6px); }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:20; padding:13px 18px;
    font-weight:900; font-size:16px; pointer-events:none; text-shadow:0 1px 8px rgba(0,0,0,.8); }
  .topbar b { color:var(--accent); }
  .progress { position:fixed; top:0; left:0; height:3px; background:var(--accent); z-index:21;
    transition:width .2s; width:0; }
  .mutehint { position:absolute; top:14px; right:14px; background:rgba(0,0,0,.55);
    padding:7px 12px; border-radius:999px; font-size:12px; font-weight:700; pointer-events:none; }
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="topbar">Hooked<b>.</b> <span style="opacity:.6;font-weight:600;font-size:12px">discover what you don't know yet</span></div>
<div id="feed"></div>

<script>
let muted = true;
fetch("out/shorts_feed.json").then(r=>r.json()).then(cards=>{
  const feed = document.getElementById("feed");
  feed.innerHTML = cards.map((c,i)=>`
    <div class="card" data-idx="${i}">
      <video src="${c.mp4}" loop muted playsinline preload="metadata"></video>
      <div class="ov"></div>
      <div class="meta">
        <div class="chan">@${c.channel||"creator"}</div>
        <div class="vtitle">${c.title}</div>
      </div>
      <div class="rail">
        <button class="rbtn" onclick="toggleMute(this)">🔇</button>
      </div>
      <a class="watch" href="${c.watch_url}" target="_blank" rel="noopener">Watch full ▶</a>
      <div class="mutehint">🔇 tap speaker for sound</div>
    </div>`).join("");

  const vids = [...feed.querySelectorAll("video")];
  const io = new IntersectionObserver(es=>{
    es.forEach(e=>{
      const v = e.target.querySelector("video");
      const idx = +e.target.dataset.idx;
      if (e.isIntersecting && e.intersectionRatio>0.6){
        document.getElementById("progress").style.width = ((idx+1)/cards.length*100)+"%";
        v.muted = muted; v.currentTime = 0; v.play().catch(()=>{});
        feed.querySelectorAll(".watch").forEach(w=>w.style.display="none");
        e.target.querySelector(".watch").style.display="block";
      } else { v.pause(); }
    });
  }, {threshold:[0,0.6,1]});
  feed.querySelectorAll(".card").forEach(c=>io.observe(c));
});

function toggleMute(btn){
  muted = !muted;
  document.querySelectorAll("#feed video").forEach(v=> v.muted = muted);
  document.querySelectorAll(".rbtn").forEach(b=> b.textContent = muted?"🔇":"🔊");
  document.querySelectorAll(".mutehint").forEach(h=> h.style.display = muted?"block":"none");
}
</script>
</body>
</html>
